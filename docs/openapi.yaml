openapi: 3.0.3
info:
  title: Trip Planner API
  description: |
    Internal corporate web service for planning employee business trips.

    Authentication: JWT Bearer token (`Authorization: Bearer <accessToken>`).
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Authentication
  - name: City
  - name: Office
  - name: Place Type
  - name: Place
  - name: Hotel
  - name: Booking
  - name: Review
  - name: Wishlist

security:
  - bearerAuth: []

paths:
  /auth/signup:
    post:
      tags: [Authentication]
      summary: Sign up
      description: Sign up new user and receive access and refresh tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Log in
      description: Authenticate an existing user and return access and refresh tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Log out
      description: Revoke the user's refresh token and log the user out.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh token
      description: |
        Generate a new access token and rotate the refresh token.
        The old refresh token is invalidated; the client must store the new one.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /cities:
    get:
      tags: [City]
      summary: Get all cities
      description: Get list of all cities.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/City'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [City]
      summary: Create city
      description: Add new city. ADMIN only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCityRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/City'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ForbiddenAdmin'
        '409':
          description: City already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /cities/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [City]
      summary: Get city
      description: Get a specific city by id.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/City'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/CityNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [City]
      summary: Update city
      description: Update a specific city by id. ADMIN only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCityRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/City'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ForbiddenAdmin'
        '404':
          $ref: '#/components/responses/CityNotFound'
        '409':
          description: City already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [City]
      summary: Delete city
      description: Delete a specific city by id. ADMIN only.
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ForbiddenAdmin'
        '404':
          $ref: '#/components/responses/CityNotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /offices:
    get:
      tags: [Office]
      summary: Get offices
      description: Get a list of offices. Optionally filter by city.
      parameters:
        - name: cityId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Filter offices by city ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Office'
        '400':
          $ref: '#/components/responses/InvalidQueryParameters'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: City not found (if cityId is provided but does not exist)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Office]
      summary: Create office
      description: Add a new office. ADMIN only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfficeRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Office'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ForbiddenAdmin'
        '404':
          $ref: '#/components/responses/CityNotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /offices/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Office]
      summary: Get office
      description: Get a specific office by id.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Office'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/OfficeNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [Office]
      summary: Update office
      description: Update a specific office. ADMIN only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfficeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Office'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ForbiddenAdmin'
        '404':
          description: Office or city not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Office]
      summary: Delete office
      description: Delete a specific office. ADMIN only.
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ForbiddenAdmin'
        '404':
          $ref: '#/components/responses/OfficeNotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /offices/{id}/nearby-places:
    parameters:
      - $ref: '#/components/parameters/IdPath'
      - $ref: '#/components/parameters/PlaceTypeIdQuery'
      - $ref: '#/components/parameters/MaxDistanceKmQuery'
    get:
      tags: [Office]
      summary: Get places near office
      description: |
        Get all active places near the selected office, sorted by distance (ascending).
        Distance is calculated using the Haversine formula or OSRM.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlaceWithDistance'
        '400':
          $ref: '#/components/responses/InvalidQueryParameters'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/OfficeNotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /place-types:
    get:
      tags: [Place Type]
      summary: Get all place types
      description: Get a list of all available place types.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlaceType'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /places:
    get:
      tags: [Place]
      summary: Get places
      description: |
        Get a list of available places with optional filtering by city, type, and distance
        from a reference point (office or place).

        When `officeId` or `referencePlaceId` is used, results are sorted by `distanceKm`
        ascending and include the `distanceKm` field. Without a distance reference, `distanceKm` is omitted.
      parameters:
        - name: cityId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: placeTypeId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: officeId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Office coordinates used as distance reference (use with maxDistanceKm)
        - name: referencePlaceId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Place coordinates used as distance reference (use with maxDistanceKm)
        - $ref: '#/components/parameters/MaxDistanceKmQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlaceWithDistance'
        '400':
          $ref: '#/components/responses/InvalidQueryParameters'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: City, office, or reference place not found (if corresponding filter is provided)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Place]
      summary: Create place
      description: |
        Create a new place. Any authenticated user can add non-hotel places (cafes, parks, etc.).
        Creating a place with placeType = HOTEL (corporate hotel list) requires ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaceRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden (not ADMIN role) when placeType is HOTEL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: City or place type not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /places/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Place]
      summary: Get place
      description: Get a specific place by id.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/PlaceNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [Place]
      summary: Update place
      description: Update a specific place by id. ADMIN only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlaceRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ForbiddenAdmin'
        '404':
          $ref: '#/components/responses/PlaceNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Place]
      summary: Delete place
      description: Delete a specific place by id. ADMIN only.
      responses:
        '204':
          description: No Content
        '400':
          description: Invalid id format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ForbiddenAdmin'
        '404':
          $ref: '#/components/responses/PlaceNotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /places/{id}/nearby-places:
    parameters:
      - $ref: '#/components/parameters/IdPath'
      - $ref: '#/components/parameters/PlaceTypeIdQuery'
      - $ref: '#/components/parameters/MaxDistanceKmQuery'
    get:
      tags: [Place]
      summary: Get places near place
      description: |
        Get all active places near the selected place (e.g. a hotel), sorted by distance (ascending).
        The reference place itself is excluded from the result.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlaceWithDistance'
        '400':
          $ref: '#/components/responses/InvalidQueryParameters'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/PlaceNotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /places/{id}/hotel-details:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Hotel]
      summary: Get hotel details
      description: Get hotel details for a specific place (only if placeType = HOTEL).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Hotel details not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Hotel]
      summary: Create hotel details
      description: Create hotel details for a corporate hotel place (only allowed if placeType = HOTEL). ADMIN only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHotelDetailsRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelDetails'
        '400':
          description: Validation error or place is not HOTEL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ForbiddenAdmin'
        '404':
          $ref: '#/components/responses/PlaceNotFound'
        '409':
          description: Hotel details already exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [Hotel]
      summary: Update hotel details
      description: Update hotel details for a corporate hotel place (only if placeType = HOTEL). ADMIN only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHotelDetailsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelDetails'
        '400':
          description: Validation error or place is not HOTEL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ForbiddenAdmin'
        '404':
          description: Hotel details not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /bookings:
    get:
      tags: [Booking]
      summary: Get bookings
      description: |
        Get a list of bookings. Regular users receive only their own bookings.
        ADMIN users receive all bookings and can filter by user.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/BookingStatus'
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: ADMIN only; filter bookings by user ID
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/InvalidQueryParameters'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden (userId filter used by non-ADMIN)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Booking]
      summary: Create booking
      description: Create a new booking for a hotel place.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Validation error (invalid dates, checkOut before checkIn, or place is not a HOTEL)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/PlaceNotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /bookings/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Booking]
      summary: Get booking
      description: Get a specific booking by id. Accessible by the booking owner or ADMIN.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden (not booking owner nor ADMIN)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/BookingNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [Booking]
      summary: Update booking
      description: Update an existing booking. Only the booking owner can update it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookingRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden (not owner of booking)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/BookingNotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /bookings/{id}/status:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [Booking]
      summary: Update booking status
      description: Allows an admin to change the status of a booking (confirm or cancel).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookingStatusRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Validation error (invalid status value)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ForbiddenAdmin'
        '404':
          $ref: '#/components/responses/BookingNotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /reviews:
    get:
      tags: [Review]
      summary: Get reviews
      description: Get a list of reviews for place cards and the admin panel.
      parameters:
        - name: placeId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: ADMIN only; filter reviews by user ID
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/InvalidQueryParameters'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden (userId filter used by non-ADMIN)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Place not found (if placeId is provided but does not exist)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Review]
      summary: Create review
      description: Create a new review for a place. One user can create only one review per place.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/PlaceNotFound'
        '409':
          description: Review already exists for this place
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /reviews/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [Review]
      summary: Update review
      description: Update an existing review. Only the owner of the review can update it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          description: Validation error (empty body, invalid rating, or comment too long)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden (not review owner)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/ReviewNotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Review]
      summary: Delete review
      description: Delete a review. ADMIN only.
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/ForbiddenAdmin'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/ReviewNotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /wishlists:
    get:
      tags: [Wishlist]
      summary: Get wishlist
      description: Get the current user's wishlist.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WishlistEntryWithPlace'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Wishlist]
      summary: Add to wishlist
      description: Add a place to the user's wishlist. Each user can add a place only once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWishlistRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistEntry'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/PlaceNotFound'
        '409':
          description: Place already in wishlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /wishlists/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    delete:
      tags: [Wishlist]
      summary: Remove from wishlist
      description: Remove a place from the current user's wishlist by wishlist entry id.
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden (not wishlist entry owner)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Wishlist entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Zero-based page index
    SizeQuery:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Page size
    PlaceTypeIdQuery:
      name: placeTypeId
      in: query
      required: false
      schema:
        type: integer
        format: int64
      description: Filter by place type ID
    MaxDistanceKmQuery:
      name: maxDistanceKm
      in: query
      required: false
      schema:
        type: number
        format: double
        exclusiveMinimum: true
        minimum: 0
      description: Return only places within this radius in km

  responses:
    Unauthorized:
      description: Unauthorized (no JWT token or invalid token)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenAdmin:
      description: Forbidden (not ADMIN role)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InvalidQueryParameters:
      description: Invalid query parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    CityNotFound:
      description: City not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    OfficeNotFound:
      description: Office not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PlaceNotFound:
      description: Place not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BookingNotFound:
      description: Booking not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ReviewNotFound:
      description: Review not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        timestamp:
          type: string
          format: date-time
      additionalProperties: true

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Successfully logged out

    TokenResponse:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    SignUpRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 64
          description: Strong password required

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    City:
      type: object
      required: [id, name, country, createdAt]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
          maxLength: 50
        country:
          type: string
          minLength: 1
          maxLength: 50
        createdAt:
          type: string
          format: date-time

    CreateCityRequest:
      type: object
      required: [name, country]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        country:
          type: string
          minLength: 1
          maxLength: 50

    Office:
      type: object
      required: [id, cityId, name, address, latitude, longitude, createdAt]
      properties:
        id:
          type: integer
          format: int64
        cityId:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
          maxLength: 100
        address:
          type: string
          minLength: 1
          maxLength: 255
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        createdAt:
          type: string
          format: date-time

    OfficeRequest:
      type: object
      required: [cityId, name, address, latitude, longitude]
      properties:
        cityId:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
          maxLength: 100
        address:
          type: string
          minLength: 1
          maxLength: 255
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180

    PlaceType:
      type: object
      required: [id, name, code]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        code:
          type: string
          description: Place type code (e.g. HOTEL, CAFE, RESTAURANT, PARK)

    Place:
      type: object
      required:
        - id
        - cityId
        - placeTypeId
        - createdBy
        - name
        - address
        - latitude
        - longitude
        - isActive
        - avgRating
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        cityId:
          type: integer
          format: int64
        placeTypeId:
          type: integer
          format: int64
        createdBy:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
          maxLength: 100
        address:
          type: string
          minLength: 1
          maxLength: 255
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        description:
          type: string
          maxLength: 1000
        isActive:
          type: boolean
        avgRating:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time

    PlaceWithDistance:
      allOf:
        - $ref: '#/components/schemas/Place'
        - type: object
          properties:
            distanceKm:
              type: number
              format: double
              description: Present when results are sorted/filtered by distance

    PlaceSummary:
      type: object
      required: [id, cityId, placeTypeId, name, address, latitude, longitude, avgRating, isActive]
      properties:
        id:
          type: integer
          format: int64
        cityId:
          type: integer
          format: int64
        placeTypeId:
          type: integer
          format: int64
        name:
          type: string
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        avgRating:
          type: number
          format: double
        isActive:
          type: boolean

    CreatePlaceRequest:
      type: object
      required: [cityId, placeTypeId, name, address, latitude, longitude]
      properties:
        cityId:
          type: integer
          format: int64
        placeTypeId:
          type: integer
          format: int64
          description: HOTEL type allowed for ADMIN only
        name:
          type: string
          minLength: 1
          maxLength: 100
        address:
          type: string
          minLength: 1
          maxLength: 255
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        description:
          type: string
          maxLength: 1000

    UpdatePlaceRequest:
      $ref: '#/components/schemas/CreatePlaceRequest'

    HotelDetails:
      type: object
      required: [id, placeId, starRating, roomCount]
      properties:
        id:
          type: integer
          format: int64
        placeId:
          type: integer
          format: int64
        starRating:
          type: integer
          minimum: 1
          maximum: 5
        phone:
          type: string
        website:
          type: string
          format: uri
        roomCount:
          type: integer
          minimum: 1

    CreateHotelDetailsRequest:
      type: object
      required: [starRating, roomCount]
      properties:
        starRating:
          type: integer
          minimum: 1
          maximum: 5
        phone:
          type: string
        website:
          type: string
          format: uri
        roomCount:
          type: integer
          minimum: 1

    BookingStatus:
      type: string
      enum: [PENDING, CONFIRMED, CANCELLED]

    Booking:
      type: object
      required: [id, userId, placeId, checkIn, checkOut, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        placeId:
          type: integer
          format: int64
        checkIn:
          type: string
          format: date
        checkOut:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/BookingStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBookingRequest:
      type: object
      required: [placeId, checkIn, checkOut]
      properties:
        placeId:
          type: integer
          format: int64
          description: Must exist and be of type HOTEL
        checkIn:
          type: string
          format: date
        checkOut:
          type: string
          format: date
          description: Must be after checkIn

    UpdateBookingRequest:
      $ref: '#/components/schemas/CreateBookingRequest'

    UpdateBookingStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/BookingStatus'

    Review:
      type: object
      required: [id, userId, placeId, rating, createdAt]
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        placeId:
          type: integer
          format: int64
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 1000
        createdAt:
          type: string
          format: date-time

    CreateReviewRequest:
      type: object
      required: [placeId, rating]
      properties:
        placeId:
          type: integer
          format: int64
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 1000

    UpdateReviewRequest:
      type: object
      minProperties: 1
      description: At least one of rating or comment must be provided. An empty object is rejected with 400.
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 1000

    WishlistEntry:
      type: object
      required: [id, userId, placeId, addedAt]
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        placeId:
          type: integer
          format: int64
        addedAt:
          type: string
          format: date-time

    WishlistEntryWithPlace:
      allOf:
        - $ref: '#/components/schemas/WishlistEntry'
        - type: object
          required: [place]
          properties:
            place:
              $ref: '#/components/schemas/PlaceSummary'

    CreateWishlistRequest:
      type: object
      required: [placeId]
      properties:
        placeId:
          type: integer
          format: int64
