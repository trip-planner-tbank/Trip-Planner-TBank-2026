spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/trip_planner}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  application:
    name: backend
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    validate-on-migrate: false

app:
  geocoding:
    base-url: ${NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
    user-agent: ${NOMINATIM_USER_AGENT:TripPlanner-TBank/1.0}
  admin:
    username: ${ADMIN_USERNAME:user1}
    email: ${ADMIN_EMAIL:user1@example.com}
    password: ${ADMIN_PASSWORD:Qwer123!}
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-to-a-long-random-value}
    access-token-seconds: ${JWT_ACCESS_TOKEN_SECONDS:900}
    refresh-token-seconds: ${JWT_REFRESH_TOKEN_SECONDS:604800}
