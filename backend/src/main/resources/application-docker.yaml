spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://db:5432/trip_planner}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    email: ${ADMIN_EMAIL:admin@example.com}
    password: ${ADMIN_PASSWORD:Admin12345}
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-to-a-long-random-value}
    access-token-seconds: ${JWT_ACCESS_TOKEN_SECONDS:900}
    refresh-token-seconds: ${JWT_REFRESH_TOKEN_SECONDS:604800}
